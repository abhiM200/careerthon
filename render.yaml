databases:
  - name: careerthon-db
    databaseName: careerthon
    user: careerthon_user

services:
  - type: web
    name: careerthon
    env: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerthon-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: careerthon-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: careerthon-db
          property: password
      - key: DATABASE_HOST
        fromDatabase:
          name: careerthon-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: careerthon-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: careerthon-db
          property: database
