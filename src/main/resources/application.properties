# Application Configuration
spring.application.name=careerthon
spring.main.lazy-initialization=true
spring.main.banner-mode=off
server.port=${PORT:8080}

# ── Startup Speed Optimizations ──────────────────────────────────────────────
# Disable open-in-view (causes extra DB queries + slower startup)
spring.jpa.open-in-view=false

# Thymeleaf
# Enable caching in prod to save memory/CPU on every request
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── H2 In-Memory Database Config ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:careerthon;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# HikariCP — small pool for free tier (512MB RAM)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA — disable verbose logging for speed
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Tomcat — reduce thread pool (default 200 threads = ~100MB stack wasted on free tier)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=50
server.tomcat.accept-count=10

# ── Mail Configuration (Real sending via SMTP) ────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@careerthon.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.test-connection=false
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator Health Check ─────────────────────────────────────────────────────
# Used by Railway & Render for liveness/readiness probes
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── Keep-Alive Self-Ping (prevents Render free-tier sleep) ────────────────────
# Set keep.alive.enabled=true in Render env vars to activate
keep.alive.enabled=${KEEP_ALIVE_ENABLED:false}
# Override this with your full Render URL e.g. https://careerthon.onrender.com
keep.alive.url=${RENDER_EXTERNAL_URL:}
