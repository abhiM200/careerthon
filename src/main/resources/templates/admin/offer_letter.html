<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Offer Letter Generator - Admin')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10 flex justify-between items-center border-b border-slate-200 pb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Offer Letter Generator</h1>
                <p class="mt-2 text-slate-600">Create official, signed PDF offer letters for new hires or interns.</p>
            </div>
            <a href="/admin/dashboard" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-50">
                Back to Dashboard
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-8">
            <form th:action="@{/admin/offer-letter/generate}" method="POST" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Candidate Full Name</label>
                        <input type="text" name="candidateName" required placeholder="e.g. John Doe" 
                               class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Position / Role</label>
                        <input type="text" name="role" required placeholder="e.g. Software Engineering Intern" 
                               class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Start Date</label>
                        <input type="date" name="startDate" required 
                               class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Stipend / Salary</label>
                        <input type="text" name="stipend" required placeholder="e.g. 15,000 INR/Month" 
                               class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Date of Issue</label>
                        <input type="date" name="issueDate" required 
                               class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-200">
                    <p class="text-xs text-slate-500 mb-4">
                        <span class="font-bold">Signatures included:</span> Abhishek, Altamsh, and Priyanshu
                    </p>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all text-lg flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Generate & Download Offer Letter PDF
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
