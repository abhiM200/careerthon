<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Course Form - Careerthon')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight" th:text="${course.id == null ? 'Create New Course' : 'Edit Course'}"></h1>
            <a href="/admin/lms/courses" class="text-indigo-600 hover:text-indigo-900 font-medium">&larr; Back to Courses</a>
        </div>
        
        <form th:action="@{${course.id == null ? '/admin/lms/course/create' : '/admin/lms/course/edit/' + course.id}}" th:object="${course}" method="post" class="bg-white p-8 rounded-xl shadow-md border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Course Title</label>
                    <input type="text" th:field="*{title}" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Instructor Name</label>
                    <input type="text" th:field="*{instructor}" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Category</label>
                    <input type="text" th:field="*{category}" placeholder="e.g. Full Stack Java, Data Science" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Difficulty Level</label>
                    <select th:field="*{difficulty}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border bg-white">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Total Duration (e.g. "45+ Hours")</label>
                    <input type="text" th:field="*{totalDuration}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Thumbnail Image URL</label>
                    <input type="text" th:field="*{thumbnailUrl}" placeholder="https://..." class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700">Course Description</label>
                <textarea th:field="*{description}" rows="4" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700">Prerequisites</label>
                <textarea th:field="*{prerequisites}" rows="2" placeholder="What should students know before starting?" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"></textarea>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium text-slate-700">Learning Outcomes</label>
                <textarea th:field="*{learningOutcomes}" rows="3" placeholder="What will students learn?" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"></textarea>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                <span th:text="${course.id == null ? 'Create Course' : 'Update Course'}"></span>
            </button>
        </form>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
