<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('YouTube Course Import - Admin')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10 flex justify-between items-center border-b border-slate-200 pb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Import YouTube Playlist</h1>
            <a href="/admin/lms/courses" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">Cancel</a>
        </div>

        <div th:if="${error}" class="mb-6 bg-red-50 text-red-700 p-4 rounded-lg border border-red-200 font-medium" th:text="${error}"></div>

        <div class="bg-white rounded-xl shadow-xl border border-slate-200 p-8">
            <form th:action="@{/admin/lms/import}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">YouTube Playlist URL</label>
                    <input type="url" name="playlistUrl" required placeholder="https://www.youtube.com/playlist?list=..." 
                           class="w-full py-3 px-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    <p class="text-xs text-slate-500 mt-2">Paste a public YouTube playlist URL. The system will automatically fetch all videos, titles, and durations to generate a complete course.</p>
                </div>
                
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all text-lg">
                    Start Import Automation
                </button>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
