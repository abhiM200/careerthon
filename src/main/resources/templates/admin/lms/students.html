<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('LMS Students - Admin')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10 flex justify-between items-center border-b border-slate-200 pb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Student Management</h1>
            <a href="/admin/lms/dashboard" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">Back</a>
        </div>

        <div th:if="${message}" class="mb-6 bg-green-50 text-green-700 p-4 rounded-lg border border-green-200 font-medium" th:text="${message}"></div>
        <div th:if="${error}" class="mb-6 bg-red-50 text-red-700 p-4 rounded-lg border border-red-200 font-medium" th:text="${error}"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add Student Form -->
            <div class="lg:col-span-1 bg-white rounded-xl shadow border border-slate-200 p-6">
                <h3 class="text-lg font-bold text-slate-900 mb-6">Create Student Account</h3>
                <form th:action="@{/admin/lms/students/add}" method="POST" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Full Name</label>
                        <input type="text" name="fullName" required class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Username (ID)</label>
                        <input type="text" name="username" required class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Password</label>
                        <input type="password" name="password" required class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Mobile Number</label>
                        <input type="text" name="mobileNumber" required class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">College Name</label>
                        <input type="text" name="collegeName" required class="w-full border rounded p-2 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Branch</label>
                            <input type="text" name="branch" required class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Grad Year</label>
                            <input type="text" name="graduationYear" required class="w-full border rounded p-2 text-sm">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700">Create Account</button>
                </form>
            </div>

            <!-- Student List & Enrollments -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow border border-slate-200 p-6">
                    <h3 class="text-lg font-bold text-slate-900 mb-6">Enroll Student in Course</h3>
                    <form th:action="@{/admin/lms/students/enroll}" method="POST" class="flex gap-4 items-end">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-slate-700 mb-1">Select Student</label>
                            <select name="studentId" required class="w-full border rounded p-2 text-sm">
                                <option value="">-- Choose Student --</option>
                                <option th:each="student : ${students}" th:value="${student.user.id}" th:text="${student.user.fullName + ' (' + student.user.username + ')'}"></option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-slate-700 mb-1">Select Course</label>
                            <select name="courseId" required class="w-full border rounded p-2 text-sm">
                                <option value="">-- Choose Course --</option>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.title}"></option>
                            </select>
                        </div>
                        <button type="submit" class="bg-green-600 text-white font-bold px-6 py-2 rounded-lg hover:bg-green-700">Enroll</button>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Student Name</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">User ID</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">College</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr th:each="student : ${students}">
                                <td class="px-6 py-4 font-bold text-sm text-slate-900" th:text="${student.user.fullName}"></td>
                                <td class="px-6 py-4 text-sm text-indigo-600" th:text="${student.user.username}"></td>
                                <td class="px-6 py-4 text-sm text-slate-500" th:text="${student.collegeName}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(students)}">
                                <td colspan="3" class="px-6 py-8 text-center text-slate-500">No students found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
