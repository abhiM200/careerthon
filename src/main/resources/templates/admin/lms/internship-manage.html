<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Manage Internships - Careerthon')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex justify-between items-center border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Internship Management</h1>
                <p class="text-slate-600 mt-2">Create internships and assign tasks for courses.</p>
            </div>
            <a href="/admin/lms/dashboard" class="text-indigo-600 hover:text-indigo-900 font-medium">Dashboard</a>
        </div>
        
        <div th:if="${message}" class="mb-6 bg-green-50 text-green-800 p-4 rounded-lg border border-green-200" th:text="${message}"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Create Internship Form -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
                    <h3 class="text-lg font-bold text-slate-900 mb-4">Create New Internship</h3>
                    <form th:action="@{/admin/lms/internship/create}" method="post">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700">Select Course</label>
                            <select name="courseId" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm px-3 py-2 border">
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.title}"></option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700">Internship Title</label>
                            <input type="text" name="title" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm px-3 py-2 border">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700">Guidelines PDF URL</label>
                            <input type="text" name="guidelinesPdfUrl" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm px-3 py-2 border">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-700">Description</label>
                            <textarea name="description" rows="3" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm px-3 py-2 border"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white rounded-md py-2 font-medium hover:bg-indigo-700">Create Internship</button>
                    </form>
                </div>
            </div>

            <!-- List Internships & Add Tasks -->
            <div class="lg:col-span-2 space-y-8">
                <div th:each="internship : ${internships}" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-slate-900" th:text="${internship.title}">Internship Title</h3>
                            <p class="text-sm text-indigo-600 font-medium mt-1" th:text="'Linked to: ' + ${internship.course.title}">Course</p>
                        </div>
                        <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded" th:text="${internship.tasks.size()} + ' Tasks'">0 Tasks</span>
                    </div>
                    
                    <p class="text-slate-600 mb-6" th:text="${internship.description}">Description</p>
                    
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-6">
                        <h4 class="font-bold text-slate-800 mb-3 text-sm uppercase tracking-wider">Current Tasks</h4>
                        <ul class="space-y-2">
                            <li th:each="task : ${internship.tasks}" class="flex justify-between items-center text-sm p-2 bg-white rounded border border-slate-100">
                                <span class="font-medium text-slate-700" th:text="${task.title}">Task Title</span>
                                <span class="text-slate-500 text-xs" th:text="'Due: ' + ${#temporals.format(task.deadline, 'dd MMM yyyy')}">Deadline</span>
                            </li>
                            <li th:if="${#lists.isEmpty(internship.tasks)}" class="text-sm text-slate-500 italic">No tasks added.</li>
                        </ul>
                    </div>

                    <form th:action="@{'/admin/lms/internship/' + ${internship.id} + '/task/add'}" method="post" class="flex gap-4">
                        <input type="text" name="title" placeholder="New Task Title" required class="flex-1 rounded-md border-slate-300 shadow-sm px-3 py-2 border text-sm">
                        <input type="datetime-local" name="deadline" required class="rounded-md border-slate-300 shadow-sm px-3 py-2 border text-sm">
                        <input type="hidden" name="description" value="Complete the specified project requirements.">
                        <button type="submit" class="bg-slate-800 text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-slate-900">Add Task</button>
                    </form>
                </div>
                
                <div th:if="${#lists.isEmpty(internships)}" class="text-center py-12 text-slate-500 bg-white rounded-xl border border-slate-200">
                    No internships have been created yet.
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
