<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Customized AI Roadmap - Careerthon AI')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-4xl mx-auto px-4">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">AI 30/60/90 Day Roadmap 📍</h1>
            <p class="mt-4 text-xl text-slate-600">Get a structured step-by-step plan to transition from your current level to a senior corporate role.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <!-- Form -->
            <form th:if="${roadmap == null}" th:action="@{/ai-tools/roadmap/generate}" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">My Current Skills</label>
                        <input type="text" name="startingFrom" required placeholder="e.g. Java Basics, Python"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Target Job Goal</label>
                        <input type="text" name="targetGoal" required placeholder="e.g. Full Stack Developer"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700 transition-all shadow-lg active:scale-[0.98]">
                    Generate My Roadmap 🗺️
                </button>
            </form>

            <!-- Result Table/Roadmap -->
            <div th:if="${roadmap != null}" class="animate-fade-in space-y-6">
                 <div class="p-8 bg-white border-2 border-green-500 rounded-3xl shadow-2xl overflow-hidden relative">
                    <div class="absolute -right-8 -top-8 text-slate-50 opacity-10 text-[200px] leading-none font-black select-none z-0">90</div>
                    <div class="relative z-10">
                        <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-2">
                           🗺️ Your Path to <span th:text="${target}" class="text-green-600 font-black">Goal</span>
                        </h3>
                        <div class="prose prose-slate max-w-none whitespace-pre-wrap text-slate-700 leading-relaxed font-bold border-l-4 border-green-200 pl-6" th:text="${roadmap}">Roadmap Content</div>
                    </div>
                 </div>
                 <a href="/ai-tools/roadmap" class="block w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-center hover:bg-slate-800 transition-all shadow-lg">New Roadmap</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
