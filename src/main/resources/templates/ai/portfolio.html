<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Professional Portfolio Content - Careerthon')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-4xl mx-auto px-4">
        <div class="text-center mb-12">
            <div class="inline-flex items-center px-4 py-2 rounded-full bg-amber-100 text-amber-700 text-sm font-bold mb-6">
                ✨ Smart Content Generation ✨
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Smart Portfolio Builder 👩‍💻</h1>
            <p class="mt-4 text-xl text-slate-600">Transform your technical projects into compelling stories for your personal website or portfolio.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <!-- Step 1: Input Page -->
            <form th:if="${portfolioContent == null}" th:action="@{/ai-tools/portfolio/generate}" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Projects Detail</label>
                        <textarea name="projects" required rows="8" placeholder="e.g. ChatApp using React & Socket.io, E-Commerce... "
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all font-mono text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Past Experience</label>
                        <textarea name="experience" required rows="8" placeholder="e.g. 2 years as Java Developer at Tech Corp..."
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition-all font-mono text-sm"></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full bg-amber-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-amber-600 transition-all shadow-lg active:scale-[0.98]">
                    Generate Portfolio Content 🏗️
                </button>
            </form>

            <!-- Step 2: Content Result -->
            <div th:if="${portfolioContent != null}" class="animate-fade-in space-y-6">
                 <div class="p-8 bg-white border-2 border-amber-500 rounded-3xl shadow-2xl">
                    <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-3">
                        <span class="text-3xl">📝</span> Your Expert-Generated Content
                    </h3>
                    <div class="prose prose-slate max-w-none whitespace-pre-wrap text-slate-700 leading-relaxed font-medium" th:text="${portfolioContent}">Portfolio Content</div>
                 </div>
                 <div class="flex gap-4">
                     <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg">Save as PDF</button>
                     <a href="/ai-tools/portfolio" class="flex-1 bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold text-center hover:bg-slate-200 transition-all">Generate Different Style</a>
                 </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
