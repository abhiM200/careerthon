<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Skill Gap Analyzer - Careerthon AI')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-4xl mx-auto px-4">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">AI Skill Gap Analyzer 🔍</h1>
            <p class="mt-4 text-xl text-slate-600">Discover exactly what skills you're missing for your dream corporate role.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <!-- Input Form -->
            <form th:if="${gapAnalysis == null}" th:action="@{/ai-tools/skill-gap/analyze}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Target Job Role</label>
                    <input type="text" name="role" required placeholder="e.g. Cloud Architect, Data Scientist"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Your Current Skills</label>
                    <textarea name="skills" required rows="6" placeholder="List your key skills (e.g. Java, SQL, Basic Python)..."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono text-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-900 transition-all shadow-lg active:scale-[0.98]">
                    Calculate Skill Gap ⚡
                </button>
            </form>

            <!-- Results -->
            <div th:if="${gapAnalysis != null}" class="animate-fade-in space-y-6">
                <div class="p-6 bg-white rounded-2xl border-2 border-indigo-500 shadow-xl">
                    <h3 class="text-xl font-black text-slate-900 mb-4 flex items-center gap-2">
                        📊 Analysis for <span th:text="${role}" class="text-indigo-600">Role</span>
                    </h3>
                    <div class="whitespace-pre-wrap text-slate-700 leading-relaxed prose prose-indigo" th:text="${gapAnalysis}">Gap Analysis</div>
                </div>
                <a href="/ai-tools/skill-gap" class="block w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold text-center hover:bg-slate-200 transition-all">New Analysis</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
