<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${course.title} + ' - Careerthon')}"></head>
<body class="bg-slate-50 min-h-screen pt-24 pb-12">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-900" th:text="${course.title}">Course Title</h1>
            <a href="/student/dashboard" class="text-indigo-600 hover:text-indigo-900 font-medium">&larr; Dashboard</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Video Player Area -->
            <div class="lg:col-span-2">
                <div class="bg-black rounded-xl overflow-hidden shadow-lg aspect-video mb-6">
                    <iframe th:if="${activeLecture != null}" class="w-full h-full" 
                            th:src="'https://www.youtube.com/embed/' + ${activeLecture.youtubeVideoId} + '?rel=0&modestbranding=1'" 
                            title="YouTube video player" frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                    <div th:if="${activeLecture == null}" class="w-full h-full flex flex-col items-center justify-center text-slate-400">
                        <span class="text-4xl mb-2">🎥</span>
                        <p>Select a lesson from the curriculum</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold text-slate-900 mb-2" th:text="${activeLecture != null ? activeLecture.title : course.title}">Title</h2>
                    <div th:if="${activeLecture != null}" class="text-sm text-slate-500 mb-6">
                        Module: <span th:text="${activeLecture.moduleName}"></span> | Duration: <span th:text="${activeLecture.duration}"></span>
                    </div>
                    
                    <!-- Tabs: Overview, Resources -->
                    <div class="border-b border-slate-200 mb-6">
                        <nav class="-mb-px flex space-x-8">
                            <a href="#" class="border-indigo-500 text-indigo-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">Overview</a>
                        </nav>
                    </div>
                    <div class="prose max-w-none text-slate-700">
                        <p th:if="${activeLecture != null && activeLecture.description != null && !activeLecture.description.isEmpty()}" th:text="${activeLecture.description}"></p>
                        <p th:unless="${activeLecture != null && activeLecture.description != null && !activeLecture.description.isEmpty()}" th:text="${course.description}"></p>
                    </div>
                </div>
            </div>

            <!-- Curriculum Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 sticky top-24 overflow-hidden flex flex-col max-h-[calc(100vh-120px)]">
                    <div class="p-6 border-b border-slate-200 bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-900 mb-4">Course Content</h3>
                        <div class="w-full bg-slate-200 rounded-full h-2.5 mb-2">
                            <div class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" th:style="'width: ' + ${progressPercentage} + '%'"></div>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-600 font-medium"><span th:text="${progressPercentage}"></span>% Complete</span>
                            <span th:if="${progressPercentage == 100}" class="text-emerald-600 font-bold">🎉 Done</span>
                        </div>
                    </div>
                    
                    <div class="overflow-y-auto flex-1 p-2">
                        <div th:each="moduleEntry : ${modules}" class="mb-4">
                            <h4 class="px-4 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider bg-slate-50 rounded" th:text="${moduleEntry.key}">Module</h4>
                            <ul class="mt-2 space-y-1">
                                <li th:each="lecture : ${moduleEntry.value}">
                                    <a th:href="@{'/student/course/' + ${course.id} + '?lectureId=' + ${lecture.id}}" 
                                       th:classappend="${activeLecture != null && activeLecture.id == lecture.id} ? 'bg-indigo-50 border-l-4 border-indigo-500 text-indigo-700' : 'text-slate-700 hover:bg-slate-50'"
                                       class="flex items-center px-4 py-3 text-sm font-medium rounded-r transition-colors">
                                        <div class="mr-3 flex-shrink-0">
                                            <span th:if="${completedLectureIds.contains(lecture.id)}" class="text-emerald-500 text-lg">✅</span>
                                            <span th:unless="${completedLectureIds.contains(lecture.id)}" class="text-slate-300 text-lg">◻️</span>
                                        </div>
                                        <span class="flex-1" th:text="${lecture.title}"></span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
