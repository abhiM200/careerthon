<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${course.title} + ' - Learning Portal')}"></head>
<body class="bg-slate-50 min-h-screen pt-20">
    <header th:replace="~{fragments/header :: header}"></header>

    <!-- Top Navigation Bar for Course -->
    <div class="bg-indigo-900 text-white shadow-md sticky top-16 z-20">
        <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/student/dashboard" class="text-indigo-200 hover:text-white transition">← Back</a>
                <h1 class="font-bold text-lg hidden sm:block truncate max-w-lg" th:text="${course.title}">Course Title</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-indigo-200">Progress: <span th:text="${progressPercentage}">0</span>%</div>
                <div class="w-32 h-2 bg-indigo-950 rounded-full overflow-hidden">
                    <div class="h-full bg-green-400 transition-all duration-500" th:style="'width: ' + ${progressPercentage} + '%'"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-screen-2xl mx-auto flex flex-col lg:flex-row" style="height: calc(100vh - 120px);">
        
        <!-- Left Sidebar: Module List -->
        <div class="w-full lg:w-80 bg-white border-r border-slate-200 flex-shrink-0 overflow-y-auto hidden lg:block h-full">
            <div class="p-4 border-b border-slate-200 bg-slate-50">
                <h2 class="font-bold text-slate-800">Course Content</h2>
            </div>
            
            <div th:each="moduleEntry : ${modules}" class="border-b border-slate-100">
                <div class="px-4 py-3 bg-slate-50 font-bold text-sm text-slate-700 uppercase tracking-wider" th:text="${moduleEntry.key}">Module Name</div>
                <ul class="divide-y divide-slate-100">
                    <li th:each="lecture : ${moduleEntry.value}">
                        <a th:href="@{/student/course/{id}(id=${course.id}, lectureId=${lecture.id})}" 
                           class="flex items-start gap-3 px-4 py-3 hover:bg-indigo-50 transition-colors"
                           th:classappend="${activeLecture != null && activeLecture.id == lecture.id} ? 'bg-indigo-50 border-l-4 border-indigo-600' : 'border-l-4 border-transparent'">
                            
                            <!-- Status Icon -->
                            <div class="mt-0.5 flex-shrink-0">
                                <svg th:if="${completedLectureIds.contains(lecture.id)}" class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                </svg>
                                <svg th:unless="${completedLectureIds.contains(lecture.id)}" class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                            </div>
                            
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-slate-900 leading-tight" th:text="${lecture.title}">Lesson Title</p>
                                <p class="text-xs text-slate-500 mt-1" th:text="${lecture.duration}">00:00</p>
                            </div>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Right Side: Video Player & Info -->
        <div class="flex-1 bg-slate-50 overflow-y-auto p-4 lg:p-8">
            <div class="max-w-4xl mx-auto">
                <div th:if="${activeLecture != null}">
                    <div class="bg-black w-full rounded-xl shadow-2xl overflow-hidden aspect-video">
                        <iframe width="100%" height="100%" 
                                th:src="'https://www.youtube.com/embed/' + ${activeLecture.youtubeVideoId} + '?rel=0&modestbranding=1'" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen></iframe>
                    </div>
                    
                    <div class="mt-6 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-2 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded" th:text="${activeLecture.moduleName}">Module</span>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900" th:text="${activeLecture.title}">Lesson Title</h2>
                        <div th:if="${activeLecture.description != null && !activeLecture.description.isEmpty()}" class="mt-4 text-slate-600 prose text-sm max-w-none" th:utext="${activeLecture.description}">
                            Description goes here
                        </div>
                    </div>
                </div>
                
                <div th:if="${activeLecture == null}" class="text-center py-20">
                    <p class="text-slate-500 font-medium">Please select a lesson from the sidebar to begin.</p>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Need minimal footer script to remove absolute footer for this specific layout -->
    <script>
        document.querySelector('footer').style.display = 'none';
    </script>
</body>
</html>
